

<ion-header>
  <ion-toolbar>
    <ion-title color="primary">componentes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list>
    @for (c of componentes; track c.name) {
      <ion-item routerLink="{{ c.redirectTo}}"
      detail>
        <ion-icon [name]="c.icon" slot="start" color="primary"></ion-icon>
        <ion-label>{{ c.name }}</ion-label>
      </ion-item>
    }
  </ion-list>

  <!--

  </ion-button>
  -->
</ion-content>
