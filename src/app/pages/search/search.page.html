<app-header titulo="Search"></app-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">search</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-searchbar
      placeholder="Buscar en la pagina"
      inputmode="text"
      (ionChange)="onSearchChange( $event )"
      [debounce]="250"
      animated>
  </ion-searchbar>

  <ion-list>
    <ion-item *ngFor="let a of albums | filtro:textoBuscar">
      <ion-label> {{ a.title }} </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
