<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" color="primary"></ion-back-button>
    </ion-buttons>
    <ion-title color="primary">Segment</ion-title>
  </ion-toolbar>

  <ion-segment value="todos" (ionChange)="segmentChange($event)">
    <ion-segment-button value="todos">
      <ion-label>Todos</ion-label>
    </ion-segment-button>

    <ion-segment-button value="DC Comics">
      <ion-label>DC Comics</ion-label>
    </ion-segment-button>

    <ion-segment-button value="Marvel">
      <ion-label>Marvel</ion-label>
    </ion-segment-button>
  </ion-segment>
</ion-header>

<ion-content [fullscreen]="true">

  @if (superHeroes | async; as heroes) {

    <ion-list>
      @for (sh of heroes | filtro:publisher:'publisher'; track sh.superhero) {
        <ion-item>
          <ion-label>
            <h2>{{ sh.superhero }}</h2>
            <p>{{ sh.first_appearance }}</p>
            <p>{{ sh.alter_ego }}</p>
          </ion-label>

          <ion-label slot="end" class="ion-text-right">{{ sh.publisher }}</ion-label>
        </ion-item>
      }
    </ion-list>

  } @else {

    <ion-list>
      @for (item of [1,1,1,1,1]; track $index) {
        <ion-item>
          <ion-label>
            <h3>
              <ion-skeleton-text [animated]="true" style="width: 70%"></ion-skeleton-text>
            </h3>
            <p>
              <ion-skeleton-text [animated]="true" style="width: 100%"></ion-skeleton-text>
            </p>
          </ion-label>

          <ion-skeleton-text slot="end" [animated]="true" style="width: 27px; height: 27px;"></ion-skeleton-text>
        </ion-item>
      }
    </ion-list>

  }

</ion-content>
