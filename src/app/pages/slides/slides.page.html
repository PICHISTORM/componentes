<ion-content>

  <swiper-container pagination="true">

    @for (slide of slides; track slide.titulo) {
      <swiper-slide>

        <ion-card mode="ios">
          <img [src]="slide.img" class="slide-image" />

          <ion-card-header>
            <ion-card-subtitle>{{ slide.titulo }}</ion-card-subtitle>
          </ion-card-header>

          <ion-card-content>
            {{ slide.desc }}
          </ion-card-content>
        </ion-card>

      </swiper-slide>
    }

    <swiper-slide>
      <ion-button (click)="onClick()" expand="block" fill="clear">
        Comenzar
      </ion-button>
    </swiper-slide>

  </swiper-container>

</ion-content>
